<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Happy Anniversary ❤️</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      overflow: hidden;
      text-align: center;
    }

    h1 {
      font-size: 3em;
      color: white;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2em;
      color: white;
      max-width: 400px;
    }

    img {
      width: 220px;
      height: auto;
      border-radius: 20px;
      margin: 20px 0;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    button {
      margin-top: 20px;
      padding: 12px 24px;
      font-size: 1.2em;
      border: none;
      border-radius: 25px;
      background-color: white;
      color: #ff6b81;
      cursor: pointer;
      transition: transform 0.2s;
    }

    button:hover {
      transform: scale(1.1);
    }

    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background-color: red;
      transform: rotate(45deg);
      animation: float 3s linear forwards;
    }

    .heart::before,
    .heart::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background-color: red;
      border-radius: 50%;
    }

    .heart::before {
      top: -10px;
      left: 0;
    }

    .heart::after {
      left: -10px;
      top: 0;
    }

    @keyframes float {
      0% {
        opacity: 1;
        transform: translateY(0) rotate(45deg);
      }
      100% {
        opacity: 0;
        transform: translateY(-600px) rotate(45deg);
      }
    }
  </style>
</head>
<body>

  <h1>Happy Anniversary, Venvano mou ❤️</h1>

  <img src="217_optimized_1000.jpg" alt="Us together ❤️">

  <p>
    8 years together, and every day with you feels like a dream.
    Thank you for being my everything. I love you more than words can say.
  </p>

  <button onclick="startExperience()">Tap for a surprise 💖</button>

  <audio id="song" src="Mono-esi.mp3"></audio>

  <script>
    function startExperience() {
      playMusic();
      createHearts();
    }

    function playMusic() {
      const audio = document.getElementById('song');
      audio.volume = 0.7;
      audio.play();
    }

    function createHearts() {
      for (let i = 0; i < 50; i++) {
        const heart = document.createElement('div');
        heart.classList.add('heart');

        heart.style.left = Math.random() * window.innerWidth + 'px';
        heart.style.top = window.innerHeight + 'px';

        const size = Math.random() * 20 + 10;
        heart.style.width = size + 'px';
        heart.style.height = size + 'px';

        heart.style.animationDuration = (Math.random() * 2 + 2) + 's';

        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 3000);
      }
    }
  </script>

</body>
</html>
